# Book 4 §10.2 - application-dependent terminal data.
#
# Per spec every Table 7 field is per-AID. The `[defaults]` block holds
# values shared across all AIDs at this terminal; each `[[aids]]` row
# may override any default. AIDs taken from a real production deployment

[defaults]
# ── Terminal-wide §10.2 values applied to the kernel `Terminal`. ──
# Tag '9F15', n4 - Merchant Category Code (5999 = Misc/Other).
merchant_category_code = 5999
# Tag '9F16', 15 bytes ANS.
merchant_identifier = "EMV_RS_DEMO0001"
# Tag '9F4E' - up to 85 bytes ANS.
merchant_name_and_location = "emv-rs PC/SC test tool"
# Tag '9F1C', 8 bytes ANS.
terminal_identification = "EMVRSDEM"

# Tag '5F2A', n3 - Transaction Currency Code (840 = USD).
transaction_currency_code = 840
# Tag '5F36', n1.
transaction_currency_exponent = 2

# ── Per-AID §10.2 values that happen to be the same for every AID
#    in this deployment. Individual rows may override. ──
partial_match_allowed = true
default_ddol = "9F3704"

# Tag '9F1B', n12 - Terminal Floor Limit in transaction-currency minor
# units. With currency = USD and exponent = 2, this is $100.00.
terminal_floor_limit = 10000

# §10.6.2 Random Transaction Selection - sample values for the demo.
# Real terminals get these from the payment-system Type Approval bundle;
# values here pick ~5% of low-value transactions and ramp to ~20% near
# the floor limit for biased-random coverage.
rts_target_percentage = 5
rts_max_target_percentage = 20
rts_threshold_value = 50

